  <div class="modal-root" id="import-modal" hidden>
    <div class="modal-backdrop" data-close-modal></div>
    <div class="modal glass import-modal" role="dialog" aria-modal="true" aria-labelledby="import-modal-title">
      <header class="wizard-head">
        <div>
          <p class="eyebrow" data-i18n="import_modal_eyebrow">Restore a plan</p>
          <h2 id="import-modal-title" data-i18n="import_modal_title">Import</h2>
        </div>
        <button type="button" class="btn-x modal-close" data-close-modal aria-label="Close">×</button>
      </header>
      <div class="import-modal-body">
        <p class="hint" data-i18n="import_paste_hint">Paste an Export URL (or #scp1… hash) from docs / a colleague, or choose a .json file.</p>
        <label class="field import-paste-field">
          <span data-i18n="import_paste_label">Paste share URL</span>
          <textarea id="import-url-input" rows="4" data-i18n-placeholder="import_paste_ph" placeholder="https://…/calc/#scp1z.…"></textarea>
        </label>
        <div class="row-actions">
          <button type="button" class="cta" id="btn-import-url-apply" data-i18n="import_apply_url">
            <span class="cta-label">Load from URL</span>
            <span class="cta-glow" aria-hidden="true"></span>
          </button>
          <label class="btn-ghost file-btn">
            <span data-i18n="import_json_file">Choose .json file</span>
            <input type="file" id="file-import" accept="application/json,.json" hidden>
          </label>
        </div>
      </div>
    </div>
  </div>
