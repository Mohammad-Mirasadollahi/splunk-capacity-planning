name: Bug report
description: Something is wrong in SCPcalc, docs, Pages, or packaging
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please include enough detail to reproduce. Redact credentials, license keys, and customer-identifying data.
  - type: input
    id: version
    attributes:
      label: SCPcalc version
      description: Output of `scpcalc version`, Docker tag, or Pages engine badge (e.g. 0.1.3).
      placeholder: "0.1.3"
    validations:
      required: true
  - type: dropdown
    id: channel
    attributes:
      label: Where did you see the bug?
      options:
        - GitHub Pages /calc (WASM)
        - Local `scpcalc serve`
        - CLI `scpcalc calc`
        - Docker / GHCR image
        - Docs / README / Pages hub
        - Other
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / browser (if UI)
      placeholder: "Linux amd64 / Chrome 128"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps. Attach Export URL or plan JSON if useful.
      placeholder: |
        1. Open …
        2. Set …
        3. Click Calculate …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include error text, wrong numbers, or screenshots.
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Extra context (optional)
      description: Related Release, workflow run, or SHA256 of the binary you used.
