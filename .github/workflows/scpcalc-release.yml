name: scpcalc Release

on:
  push:
    tags:
      - "scpcalc-v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scpcalc
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
      - name: Version from tag
        id: ver
        run: |
          VERSION="${GITHUB_REF_NAME#scpcalc-v}"
          VERSION="${VERSION#scpcalc-}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
      - name: Build WASM + cross-compile
        run: |
          chmod +x scripts/make_release.sh scripts/build_wasm.sh
          GO=go VERSION="${{ steps.ver.outputs.version }}" bash scripts/make_release.sh "${{ steps.ver.outputs.version }}"
      - name: Build release notes from CHANGELOG
        working-directory: .
        run: |
          python3 tools/build_release_notes.py "${{ steps.ver.outputs.version }}" \
            --out "$RUNNER_TEMP/scpcalc-release-notes.md"
          echo "---- release notes preview ----"
          head -n 40 "$RUNNER_TEMP/scpcalc-release-notes.md"
      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          name: SCPcalc ${{ steps.ver.outputs.version }}
          files: scpcalc/releases/scpcalc-v${{ steps.ver.outputs.version }}/*
          # CHANGELOG is the source of truth for "what changed"; avoid duplicating raw commit spam.
          generate_release_notes: false
          body_path: ${{ runner.temp }}/scpcalc-release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
